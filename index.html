<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BNP FAMILY</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  overflow: hidden;
}

/* BACKGROUND ANIMÉ */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: repeating-linear-gradient(
    0deg,
    #111 0px,
    #111 2px,
    black 2px,
    black 4px
  );
  animation: moveBg 10s linear infinite;
  z-index: -1;
}

@keyframes moveBg {
  from { transform: translateY(0); }
  to { transform: translateY(-200px); }
}

/* LOGO */
.logo {
  font-size: 48px;
  margin-top: 80px;
  color: #ff0033;
  text-shadow: 0 0 10px #ff0033, 0 0 30px #ff0033;
  animation: glitch 1s infinite;
}

/* GLITCH */
@keyframes glitch {
  0% { transform: translate(0); }
  20% { transform: translate(-2px, 2px); }
  40% { transform: translate(2px, -2px); }
  60% { transform: translate(-1px, 1px); }
  80% { transform: translate(1px, -1px); }
  100% { transform: translate(0); }
}

/* SLOGAN */
.tagline {
  margin-top: 10px;
  color: #aaa;
  letter-spacing: 4px;
  font-size: 14px;
}

/* LIGNE */
.line {
  width: 60px;
  height: 2px;
  background: #ff0033;
  margin: 30px auto;
  box-shadow: 0 0 10px #ff0033;
}

/* PLAYER */
iframe {
  margin-top: 30px;
  width: 90%;
  max-width: 500px;
  height: 166px;
  border: none;
}

/* BOUTON */
.button {
  display: inline-block;
  margin-top: 40px;
  padding: 15px 35px;
  border: 2px solid #ff0033;
  color: #ff0033;
  text-decoration: none;
  letter-spacing: 2px;
  transition: 0.3s;
}

.button:hover {
  background: #ff0033;
  color: black;
  box-shadow: 0 0 20px #ff0033;
}
</style>

</head>

<body>

<div class="logo">BNP FAMILY</div>
<div class="tagline">BORN IN NOISE. BUILT FOR PARTY.</div>
<div class="line"></div>

<iframe 
src="https://w.soundcloud.com/player/?url=https://soundcloud.com/manu_bnp">
</iframe>

<a href="https://soundcloud.com/manu_bnp" target="_blank" class="button">
LISTEN NOW
</a>

</body>
</html>
